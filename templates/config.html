{% extends "base.html" %}

{% block page_id %}config{% endblock %}

{% block content %}
  <section class="panel-grid">
    <article class="panel">
      <div class="panel-heading"><h2>Detector Controls</h2></div>
      <form id="config-form" class="form-grid">
        <label>
          <span>Sensitivity</span>
          <input type="number" step="0.01" min="0.1" max="1.0" id="cfg-sensitivity">
        </label>
        <label>
          <span>Min Motion Ratio</span>
          <input type="number" step="0.001" min="0.001" max="0.5" id="cfg-motion">
        </label>
        <label>
          <span>Cooldown Seconds</span>
          <input type="number" step="0.5" min="0" id="cfg-cooldown">
        </label>
        <label>
          <span>Retention Days</span>
          <input type="number" min="1" max="90" id="cfg-retention">
        </label>
        <label class="checkbox-row">
          <input type="checkbox" id="cfg-advanced">
          <span>Enable optional HOG person detection</span>
        </label>
        <button type="submit">Save Configuration</button>
      </form>
      <p id="config-status" class="muted"></p>
    </article>

    <article class="panel">
      <div class="panel-heading"><h2>Current Config</h2></div>
      <pre id="config-json" class="code-panel">Loading...</pre>
    </article>
  </section>
{% endblock %}
